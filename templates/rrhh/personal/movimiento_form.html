{% extends 'base_rrhh.html' %}
{% load static %}

{% block title %}Registrar Movimiento{% endblock %}

{% block content %}

<style>
.form-section-title {
    font-weight: 600;
    font-size: 1.1rem;
    margin-bottom: .7rem;
    color: #0d6efd;
}

.form-label {
    font-weight: 600;
}

.card {
    border-radius: 10px;
}
</style>

<div class="card shadow-sm">

    <!-- HEADER -->
    <div class="card-header d-flex justify-content-between align-items-center">
        <h4 class="mb-0 text-primary">
            <i class="fas fa-plus-circle me-2"></i> Registrar movimiento
        </h4>

        <a href="{% url 'rrhh:movimientos_list' %}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Volver
        </a>
    </div>

    <div class="card-body">

        <form method="post">
            {% csrf_token %}

            <div class="row mb-3">

                <!-- Tipo de movimiento -->
                <div class="col-md-4">
                    <label class="form-label">Tipo</label>
                    {{ form.tipo }}
                </div>

                <!-- Empleado -->
                <div class="col-md-8">
                    <label class="form-label">Empleado</label>
                    {{ form.empleado }}
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Detalle</label>
                {{ form.detalle }}
            </div>

            <!-- Botones -->
            <div class="mt-4 d-flex justify-content-end gap-2">
                <a href="{% url 'rrhh:movimientos_list' %}" class="btn btn-outline-secondary">
                    Cancelar
                </a>
                <button type="submit" class="btn btn-primary">
                    Guardar movimiento
                </button>
            </div>

        </form>

    </div>
</div>

{% endblock %}
