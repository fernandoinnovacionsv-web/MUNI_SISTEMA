{% load static %}

<h4 class="text-primary mb-3 fw-bold"><i class="fas fa-camera me-2"></i> Fotografía del Empleado</h4>
<p class="text-muted small mb-4">Puede cargar un archivo existente o utilizar la cámara web para tomar una foto nueva.</p>

<div class="row">
    <div class="col-md-6 mb-3">
        <div class="card shadow-sm border-0 h-100">
            <div class="card-body">
                <label class="form-label fw-bold">Opción 1: Subir Archivo</label>
                <div class="mb-4" id="inputContainer">
                    {# Asegúrate de que este campo esté renderizado por Django #}
                    {{ empleado_form.foto }}
                </div>
                
                <hr class="my-4">

                <label class="form-label fw-bold">Opción 2: Usar Cámara</label>
                <button type="button" class="btn btn-info text-white w-100 mb-3 shadow-sm" id="startCamera">
                    <i class="fas fa-video me-2"></i> Activar Cámara Web
                </button>
                
                <div id="cameraControls" class="d-none text-center bg-dark p-2 rounded">
                    <div class="position-relative overflow-hidden rounded mb-2">
                        <video id="video" autoplay playsinline style="width:100%; height: auto; transform: scaleX(-1); background: #000;"></video>
                    </div>
                    <canvas id="canvas" class="d-none"></canvas>
                    <div class="d-flex justify-content-center gap-2">
                        <button type="button" class="btn btn-danger rounded-circle p-3 shadow" id="snap" title="Capturar">
                            <i class="fas fa-camera fa-lg"></i>
                        </button>
                        <button type="button" class="btn btn-secondary rounded-circle p-3 shadow" id="stopCamera" title="Cancelar">
                            <i class="fas fa-times fa-lg"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-6 text-center">
        <div class="card shadow-sm border-0 h-100">
            <div class="card-body d-flex flex-column align-items-center justify-content-center bg-light">
                <label class="form-label fw-bold text-uppercase text-muted mb-3">Vista Previa</label>
                <div class="border rounded p-2 bg-white shadow-sm" style="width: 220px; height: 220px; overflow: hidden;">
                    <img id="preview" src="{% if empleado.foto %}{{ empleado.foto.url }}{% else %}{% static 'img/default-profile.png' %}{% endif %}" 
                         class="img-fluid" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <p id="photoName" class="small text-success mt-2 fw-bold"></p>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    // Usamos una función anónima para no ensuciar el scope global
    document.addEventListener("DOMContentLoaded", function() {
        const startBtn = document.getElementById('startCamera');
        const stopBtn = document.getElementById('stopCamera');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const snapBtn = document.getElementById('snap');
        const preview = document.getElementById('preview');
        const controls = document.getElementById('cameraControls');
        const photoName = document.getElementById('photoName');
        
        // CORRECCIÓN CLAVE: Buscamos el input de tipo file dentro del contenedor
        // independientemente de si el ID es id_foto o algo más.
        const fileInput = document.querySelector('input[type="file"]'); 
        
        let stream = null;

        if (!fileInput) {
            console.error("No se encontró el input de archivo generado por Django.");
            return;
        }

        fileInput.setAttribute('accept', 'image/*');

        // Función para apagar la cámara
        const turnOffCamera = () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            video.srcObject = null;
            controls.classList.add('d-none');
            startBtn.classList.remove('d-none');
        };

        // 1. Activar Cámara
        startBtn.addEventListener('click', async () => {
            try {
                // Constraints para mejor calidad y compatibilidad móvil (playsinline)
                const constraints = { 
                    video: { 
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: "user" 
                    } 
                };
                
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                // Esperar a que el video cargue para mostrar controles
                video.onloadedmetadata = () => {
                    video.play();
                    controls.classList.remove('d-none');
                    startBtn.classList.add('d-none');
                };
            } catch(e) {
                console.error(e);
                alert("Error: No se pudo acceder a la cámara. Asegúrese de estar en una conexión segura (HTTPS o localhost) y haber dado permisos.");
            }
        });

        // 2. Capturar Foto
        snapBtn.addEventListener('click', () => {
            if (!stream) return;

            // Ajustar canvas al tamaño real del video
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            
            const ctx = canvas.getContext('2d');
            // Aplicar espejo para que la foto salga igual a lo que se ve en pantalla
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Convertir a Blob con alta calidad
            canvas.toBlob(blob => {
                const now = new Date().getTime();
                const fileName = `foto_agente_${now}.jpg`;
                const file = new File([blob], fileName, { type: "image/jpeg" });
                
                // ASIGNACIÓN PROFESIONAL AL INPUT FILE
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                fileInput.files = dataTransfer.files;
                
                // Mostrar preview y nombre del archivo
                const url = URL.createObjectURL(blob);
                preview.src = url;
                photoName.innerHTML = '<i class="fas fa-check-circle"></i> Captura realizada';
                
                turnOffCamera();
                startBtn.innerHTML = '<i class="fas fa-sync me-2"></i> Tomar otra foto';
            }, 'image/jpeg', 0.95);
        });

        // 3. Cancelar / Detener
        stopBtn.addEventListener('click', turnOffCamera);

        // 4. Preview al elegir archivo manual
        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    photoName.innerHTML = '<i class="fas fa-file-upload"></i> Archivo seleccionado';
                };
                reader.readAsDataURL(this.files[0]);
                turnOffCamera();
            }
        });
    });
})();
</script>
